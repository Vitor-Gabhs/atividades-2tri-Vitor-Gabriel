<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro</title>
    </head>
    <body> 
        <form>
            <h1>Cadastro para palestra</h1>
            <label for="nome">Nome</label>
            <input type="text" name="name" id="nome" placeholder="digite seu nome">
            <label for="email">CPF</label>
            <input type="email" name="email" id="email" placeholder="digite seu CPF">
            <label for="senha">Crie um código de acesso</label>
            <input type="password" name="password" id="senha" placeholder="digite seu código de acesso">
            <button type="submit">Cadastrar</button>
        </form>
